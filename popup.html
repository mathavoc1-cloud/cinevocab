<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 320px;
      padding: 12px;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
    }
    h2 { margin: 0 0 10px; font-size: 16px; color: #a78bfa; }
    #word-input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #0f0f1a;
      color: #eee;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    #save-btn {
      width: 100%;
      padding: 8px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 12px;
    }
    #save-btn:hover { background: #6d28d9; }
    #status { font-size: 12px; color: #86efac; margin-bottom: 8px; min-height: 16px; }
    #word-list { list-style: none; padding: 0; margin: 0; max-height: 260px; overflow-y: auto; }
    #word-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      border-bottom: 1px solid #2a2a3e;
      font-size: 13px;
    }
    #word-list li:last-child { border-bottom: none; }
    .del-btn {
      background: none;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
    }
    .empty { color: #888; font-size: 13px; text-align: center; padding: 16px 0; }
  </style>
</head>
<body>
  <h2>🇫🇷 French Vocab Saver</h2>
  <input id="word-input" type="text" placeholder="Word or phrase..." />
  <button id="save-btn">Save</button>
  <div id="status"></div>
  <ul id="word-list"></ul>
  <script src="popup.js"></script>
</body>
</html>
